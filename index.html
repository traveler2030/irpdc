d":"K55223DJ7143","h":"미확인","hd":"","du":"","ds":"","sa":{"total":null,"detail":[]},"ba":{"total":null,"detail":[]},"sp2":"1) 이 투자신탁은 주식 관련 국내외 집합투자증권에 주로 투자하면서 대체자산 관련 국내외 집합투자증권에도 일부\n병행 투자하는 주식형 모투자신탁과 채권 관련 국내외 집합투자증권에 주로 투자하는 채권형 모투자신탁에 투자비중\n을 탄력적으로 조절하여 투자하는 자투자신탁입니다. 이 투자신탁은 투자자의 노후자금 마련 등 장기적인 투자목적\n달성을 위한 특정 목표시점(Target Date)을 2030년으로 설정하여 설계한 생애주기 투자 모델과 금융시장 상황을 고\n려한 자산배분 모델 등을 활용하여 국내외 주식, 채권 및 대체자산 관련 자산에 탄력적으로 조절하여 투자합니다.\n\n2) 또한 각 모투자신탁은 외화표시 해외 집합투자증권 등에의 투자로 인한 환율변동 위험을 관리하기 위하여 해당\n외화표시 자산의 50%수준 이상에서 해당 해외 집합투자증권 등 외화표시 자산의 표시통화 관련 파생상품을 활용\n하여 환헤지 전략을 실시할 계획입니다. 그러나, 급격한 투자자산의 가치 변동 및 환율 변동, 환헤지 수단의 부재\n또는 유동성 부족 및 대량 설정·환매 등 다양한 변수에 인해 환헤지 전략이 원활히 수행되지 않을 수 있으며, 이로\n인해 투자신탁재산 일부 또는 전부가 환위험에 노출될 수 있습니다.\nBM(벤치마크)은 제로인이 부여한 BM으로 투자설명서의 BM 또는 비교지수와 다를 수 있습니다.\n제로인에서 제공하는 데이터 및 분석자료는 단순 정보제공을 목적으로 하며, 특정 펀드에 대한 투자를 권고하거나 거래를 목적으로 하지 않습니다.\n제로인의 제공내용은 운용사의 공시 등 신뢰할만한 판단자료로 얻어진 것이나, 그 정확성이나 완전성을 당사가 보증하는 것은 아닙니다. 따라서, 본 정보에 의존해 행해지는 행위로 인해 발생하는 결과에 대해 당사는 책임을 지지 않습니다.\n제로인에서 제공하는 데이터 및 분석자료는 무단으로 배포하거나 재활용 할 수 없습니다.","sd2":"","sty":"자산배분","cu":"https://www.kbam.co.kr/","ch":[]},{"c":"케이비자산운용","bn":"KB다이나믹TDF2030증권자투자신탁(주식혼합-재간접형)C-퇴직e","cl":"","sf":"적격TDF","t":"TDF","v":2030,"a":0,"r1":0,"r2":0,"r3":0,"ft2":null,"ftr":null,"cd":"K55223DJ7150","h":"미확인","hd":"","du":"","ds":"","sa":{"total":null,"detail":[]},"ba":{"total":null,"detail":[]},"sp2":"1) 이 투자신탁은 주식 관련 국내외 집합투자증권에 주로 투자하면서 대체자산 관련 국내외 집합투자증권에도 일부\n병행 투자하는 주식형 모투자신탁과 채권 관련 국내외 집합투자증권에 주로 투자하는 채권형 모투자신탁에 투자비중\n을 탄력적으로 조절하여 투자하는 자투자신탁입니다. 이 투자신탁은 투자자의 노후자금 마련 등 장기적인 투자목적\n달성을 위한 특정 목표시점(Target Date)을 2030년으로 설정하여 설계한 생애주기 투자 모델과 금융시장 상황을 고\n려한 자산배분 모델 등을 활용하여 국내외 주식, 채권 및 대체자산 관련 자산에 탄력적으로 조절하여 투자합니다.\n\n2) 또한 각 모투자신탁은 외화표시 해외 집합투자증권 등에의 투자로 인한 환율변동 위험을 관리하기 위하여 해당\n외화표시 자산의 50%수준 이상에서 해당 해외 집합투자증권 등 외화표시 자산의 표시통화 관련 파생상품을 활용\n하여 환헤지 전략을 실시할 계획입니다. 그러나, 급격한 투자자산의 가치 변동 및 환율 변동, 환헤지 수단의 부재\n또는 유동성 부족 및 대량 설정·환매 등 다양한 변수에 인해 환헤지 전략이 원활히 수행되지 않을 수 있으며, 이로\n인해 투자신탁재산 일부 또는 전부가 환위험에 노출될 수 있습니다.\n
