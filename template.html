<div class="hdr"><h1>DC/IRP 안전자산 30% 펀드 스크리너</h1><div class="sub">안전자산 편입 가능 상품만 · 순자산 50억+ · {{FUND_COUNT}}개 펀드 · <span id="dateInfo">{{REF_DATE}} 기준</span></div></div>

<div class="toast" id="toast"></div>

<span style="color:var(--bd2)">|</span>
<a href="https://dis.kofia.or.kr/websquare/index.jsp?w2xPath=/wq/fundann/DISFundFeeCMS.xml&divisionId=MDIS01005001000000&serviceId=SDIS01005001000" target="_blank" rel="noopener" style="color:var(--bl);text-decoration:none">펀드별 보수비용비교 (보수/TER)</a>
</div>
<div style="margin-top:6px;font-size:10px;color:var(--tm);line-height:1.6">
연금상품종류 "퇴직연금" 선택 → 검색 → 엑셀 다운로드 · 보수비용은 기준일자 확인 후 검색 → 엑셀 다운로드

<script>
var D={{FUND_DATA}};
var M=D.map(function(d,i){var o={id:i};for(var k in d){if(k!=='ch')o[k]=d[k];}o.children=d.ch||[];return o;});
var mA=Math.max.apply(null,M.map(function(d){return d.a;}));var EX={};
var STS=['안전자산','적격TDF'];
var F={sf:{},tdf:'all',vin:'all',co:'all',h:'all',s:'',tmi:'',tma:'',sk:'nr',sd:-1,tab:'fund',preset:'',grp:true};
var CMP={};
var REF_DATE='{{REF_DATE_RAW}}';
function daysAgo(){var p=REF_DATE.match(/(\d{4})(\d{2})(\d{2})/);if(!p)return 0;var rd=new Date(+p[1],+p[2]-1,+p[3]);return Math.floor((new Date()-rd)/86400000);}
function toggleCmp(id){if(CMP[id]){delete CMP[id];}else{if(Object.keys(CMP).length>=3){toast('최대 3개까지 비교 가능');return;}CMP[id]=true;}R();}
function clearCmp(){CMP={};R();}
function showCmpPanel(){var ids=Object.keys(CMP).map(Number);if(ids.length<2){toast('2개 이상 선택해주세요');return;}var ds=ids.map(function(id){return M[id];});var h='<div class="cmp-panel">';for(var i=0;i<ds.length;i++){var d=ds[i];h+='<div class="cmp-col"><h4>'+d.bn.substring(0,25)+(d.etf?' [ETF]':'')+'<\/h4>';h+='<div class="cmp-row"><span>유형<\/span><span>'+d.st+'<\/span><\/div>';h+='<div class="cmp-row"><span>환헤지<\/span><span>'+d.h+'<\/span><\/div>';h+='<div class="cmp-row"><span>순자산<\/span><span>'+FA(d.a)+'억<\/span><\/div>';h+='<div class="cmp-row"><span>TER<\/span><span>'+(d.ftr?d.ftr.toFixed(3)+'%':'-')+'<\/span><\/div>';h+='<div class="cmp-row"><span>실질1Y<\/span><span style="color:'+(d.nr>0?'var(--gn)':'var(--rd)'+'">'+(d.nr?d.nr.toFixed(2)+'%':'-'))+'<\/span><\/div>';h+='<div class="cmp-row"><span>1Y<\/span><span>'+(d.r1?d.r1.toFixed(2)+'%':'-')+'<\/span><\/div>';h+='<div class="cmp-row"><span>2Y<\/span><span>'+(d.r2?d.r2.toFixed(2)+'%':'-')+'<\/span><\/div>';h+='<div class="cmp-row"><span>3Y<\/span><span>'+(d.r3?d.r3.toFixed(2)+'%':'-')+'<\/span><\/div>';h+='<div class="cmp-row"><span>주식<\/span><span>'+(d.sp||0)+'%<\/span><\/div>';h+='<div class="cmp-row"><span>채권<\/span><span>'+(d.bp||0)+'%<\/span><\/div>';h+=AB(d);h+='<\/div>';}h+='<\/div>';OP('펀드 비교 ('+ds.length+'개)',h);}
function applyPreset(name){if(F.preset===name){F.preset='';F.tdf='all';F.sk='nr';F.sd=-1;F.tmi='';F.tma='';}else{F.preset=name;STS.forEach(function(s){F.sf[s]=true;});F.vin='all';F.co='all';F.h='all';F.s='';if(name==='maxstock'){F.tdf='TDF';F.sk='sp';F.sd=-1;F.tmi='';F.tma='';}else if(name==='stable'){F.tdf='Non-TDF';F.sk='nr';F.sd=-1;F.tmi='';F.tma='';}else if(name==='lowcost'){F.tdf='all';F.sk='ftr';F.sd=1;F.tmi='';F.tma='0.2';}}R();}
STS.forEach(function(s){F.sf[s]=true;});
function GF(){var raw=M.filter(function(d){if(F.tab==='fund'&&d.etf)return false;if(F.tab==='etf'&&!d.etf)return false;if(!F.sf[d.sf])return false;if(F.tdf!=='all'&&d.t!==F.tdf)return false;if(F.vin!=='all'&&d.v!==parseInt(F.vin))return false;if(F.co!=='all'&&d.c!==F.co)return false;if(F.h!=='all'&&d.h!==F.h)return false;if(F.tmi!==''&&d.ftr<parseFloat(F.tmi))return false;if(F.tma!==''&&d.ftr>parseFloat(F.tma))return false;if(F.s){var q=F.s.toLowerCase();if(d.bn.toLowerCase().indexOf(q)<0&&d.c.toLowerCase().indexOf(q)<0&&d.cd.toLowerCase().indexOf(q)<0)return false;}return true;}).sort(function(a,b){var va=a[F.sk],vb=b[F.sk];if(typeof va==='string')return va.localeCompare(vb)*F.sd;if(va==null)va=-9999;if(vb==null)vb=-9999;return(va-vb)*F.sd;});
if(F.grp){var seen={},out=[];for(var i=0;i<raw.length;i++){var d=raw[i];var key=d.bn;if(seen[key])continue;seen[key]=true;out.push(d);}return out;}return raw;}
function SC(s){return s==='안전자산'?'sf':s==='적격TDF'?'qt':'mx';}function SL(s){return s==='안전자산'?'안전':s==='적격TDF'?'적격TDF':'혼합';}
function RC(v){return(v==null||v===0)?'z':v>0?'p':'ng';}function FR(v,d){if(d&&d.etf&&d.days_listed&&d.days_listed<365&&d.since_listing!=null){return'<span title="상장후 '+d.days_listed+'일">'+d.since_listing.toFixed(2)+'%*<\/span>';}return(v!=null&&v!==0)?v.toFixed(2)+'%':'-';}
function FF(v){return v>0?v.toFixed(3)+'%':'-';}function FC(v){return v<=0?'z':v<=0.4?'fl':v<=0.7?'fm':'fh';}
function FA(v){if(v>=100000)return(v/10000).toFixed(0)+'조';if(v>=10000)return(v/10000).toFixed(1)+'조';return Math.round(v).toLocaleString();}
function SA(k){return F.sk===k?(F.sd===1?' ▲':' ▼'):'';}
